<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jicoba Data Apps</title>
  <link rel="stylesheet" href="home.css" />
</head>
<body>
  <main class="home">
    <header class="hero">
      <p class="eyebrow">JICOBA</p>
      <h1>앱 선택 화면</h1>
      <p class="desc">원하는 페이지를 선택해서 바로 확인하세요.</p>
    </header>

    <section class="card-grid" aria-label="앱 목록">
      <article class="card">
        <h2>계산기</h2>
        <p>사칙연산 계산기 화면입니다.</p>
        <a class="btn" href="/calculator">계산기 열기</a>
      </article>
      <article class="card">
        <h2>상담 통계 대시보드</h2>
        <p>CSV 데이터를 읽어 연도/유형별 통계를 보여줍니다.</p>
        <a class="btn" href="/dashboard">대시보드 열기</a>
      </article>
    </section>
  </main>
</body>
</html>
